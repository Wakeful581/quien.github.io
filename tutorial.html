<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tutorial</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      background: #5b8d27;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 32px;
    }

    /* ── Área de video ── */
    .anim-area {
      /* Ancho = el menor entre 92vw y el ancho máximo que cabe en 78vh con la proporción del video */
      width: min(92vw, calc(78vh * 1622 / 1080));
      height: auto;
      aspect-ratio: 1622 / 1080;   /* proporción exacta del video — sin barras negras */
      border-radius: 16px;
      overflow: hidden;
      background: #000;
      box-shadow: 0 8px 40px rgba(0,0,0,0.6);
    }

    .anim-area video {
      width: 100%;
      height: 100%;
      object-fit: contain;   /* no recorta — respeta las proporciones 1622×1080 */
      display: block;
    }

    /* ── Botones de navegación ── */
    .nav {
      display: flex;
      gap: 24px;
      align-items: center;
    }

    .nav img.btn-img {
      height: 120px;
      cursor: pointer;
      transition: transform 0.15s, filter 0.15s;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.4));
    }

    .nav img.btn-img:hover  { transform: scale(1.06); filter: drop-shadow(0 6px 12px rgba(0,0,0,0.5)) brightness(1.1); }
    .nav img.btn-img:active { transform: scale(0.95); }

    /* ── Control de audio ── */
    .audio-control {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-direction: row-reverse;
    }

    .music-btn {
      width: 90px;
      cursor: pointer;
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .music-btn:hover { transform: scale(1.1); }

    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      border-radius: 50px;
      padding: 6px 14px;
      opacity: 0;
      pointer-events: none;
      transform: translateX(12px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    .audio-control:hover .volume-wrap {
      opacity: 1;
      pointer-events: all;
      transform: translateX(0);
    }

    .vol-icon {
      font-size: 16px;
      user-select: none;
      color: #fff;
    }

    input[type="range"].vol-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100px;
      height: 4px;
      border-radius: 4px;
      background: rgba(255,255,255,0.25);
      outline: none;
      cursor: pointer;
    }

    input[type="range"].vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 0 4px rgba(0,0,0,0.5);
      cursor: pointer;
      transition: transform 0.15s;
    }

    input[type="range"].vol-slider::-webkit-slider-thumb:hover {
      transform: scale(1.3);
    }

    input[type="range"].vol-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border: none;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
    }

    .vol-label {
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      min-width: 32px;
      text-align: right;
      font-family: 'Segoe UI', sans-serif;
    }

    /* ═══════════════════════════════════════════
       RESPONSIVE — Vertical / Portrait Mobile
       Solo aplica en pantallas ≤ 600 px portrait.
       No se toca nada del layout de escritorio.
    ═══════════════════════════════════════════ */
    @media screen and (max-width: 600px) and (orientation: portrait) {

      body {
        justify-content: center;
        gap: 20px;
      }

      /* ── Área de video: más compacta en altura ── */
      .anim-area {
        width: 92vw;
        height: auto;
        aspect-ratio: 16 / 9;  /* ← proporción exacta de video */
      }

      /* En móvil volvemos a cover para que llene sin barras negras */
      .anim-area video {
        object-fit: cover;
      }

      /* ── Botones de navegación ── */
      .nav {
        gap: clamp(30px, 10vw, 60px);
      }

      .nav img.btn-img {
        height: clamp(60px, 17vw, 90px);
      }

      /* ── Control de audio ── */
      .music-btn {
        width: clamp(55px, 16vw, 80px);
      }

      .audio-control {
        top: 12px;
        right: 12px;
      }
    }
  </style>
</head>
<body>

  <!-- Video tutorial -->
  <div class="anim-area">
    <video src="tutorial/tutorial.mp4" autoplay loop playsinline></video>
  </div>

  <!-- Navegación -->
  <div class="nav">
    <img src="img/ui/volver.png"  class="btn-img" alt="Volver"   onclick="goTo('niveles.html')">
    <img src="img/ui/inicio.png"  class="btn-img" alt="Jugar"    onclick="goTo('niveles/nivel1.html')">
  </div>

  <!-- ── Control de audio ── -->
  <div class="audio-control">
    <img src="img/ui/sound-on.png"
         id="musicBtn"
         class="music-btn"
         onclick="toggleMusic(); event.stopPropagation();">

    <div class="volume-wrap" onclick="event.stopPropagation()">
      <span class="vol-icon">🔊</span>
      <input type="range" class="vol-slider"
             id="volSlider"
             min="0" max="100" value="20"
             oninput="setVolume(this.value)">
      <span class="vol-label" id="volLabel">20%</span>
    </div>
  </div>

  <audio id="hoverSound" src="sounds/pop.wav"></audio>
  <audio id="bgMusic"    src="sounds/music.wav" loop></audio>

  <script>
    const sound  = document.getElementById("hoverSound");
    const music  = document.getElementById("bgMusic");
    const btn    = document.getElementById("musicBtn");
    const slider = document.getElementById("volSlider");
    const label  = document.getElementById("volLabel");

    let activated    = false;
    let musicStarted = false;

    document.addEventListener("click", () => {
      if (!activated && sound) {
        sound.play().then(() => {
          sound.pause();
          sound.currentTime = 0;
          sound.volume = 0.1;
          activated = true;
        }).catch(() => {});
      }
      if (!musicStarted && music) {
        music.volume = slider.value / 100;
        music.play();
        musicStarted = true;
      }
    });

    function setVolume(val) {
      const v = val / 100;
      if (music) music.volume = v;
      if (sound) sound.volume = Math.min(v, 0.3);
      label.textContent = val + "%";
      slider.style.background =
        `linear-gradient(to right, rgba(255,255,255,0.9) ${val}%, rgba(255,255,255,0.2) ${val}%)`;
      const icon = document.querySelector('.vol-icon');
      if (val == 0)      icon.textContent = '🔇';
      else if (val < 40) icon.textContent = '🔉';
      else               icon.textContent = '🔊';
    }

    setVolume(slider.value);

    function toggleMusic() {
      if (!music || !btn) return;
      if (music.paused) {
        music.play();
        btn.src = "img/ui/sound-on.png";
      } else {
        music.pause();
        btn.src = "img/ui/sound-off.png";
      }
    }

    function goTo(url) {
      if (activated && sound) {
        sound.currentTime = 0;
        sound.play();
        sound.onended = () => window.location.href = url;
      } else {
        window.location.href = url;
      }
    }
  </script>

</body>
</html>
