<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nivel 1</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;800&family=Nunito:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; user-select: none; }

    :root {
      --bus-bg: #e8f4f8;
      --seat-normal: #a8c8e8;
      --seat-disabled: #f5c842;
      --seat-filled: #6dbd7a;
      --seat-error: #e05555;
      --red-line: #e02020;
      --hud-bg: rgba(20,30,50,0.88);
      --font-head: 'Baloo 2', cursive;
      --font-body: 'Nunito', sans-serif;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #1a2a3a;
      font-family: var(--font-body);
    }

    /* ─── HUD ─── */
    #hud {
      position: fixed; top: 0; left: 0; right: 0;
      height: 52px;
      background: var(--hud-bg);
      display: flex; align-items: center; justify-content: space-between;
      padding: 0 24px;
      z-index: 100;
      border-bottom: 2px solid rgba(255,255,255,0.08);
    }
    #hud .label { color: rgba(255,255,255,0.5); font-size: 12px; letter-spacing: 1px; text-transform: uppercase; }
    #hud .value { color: #fff; font-family: var(--font-head); font-size: 22px; line-height: 1; }
    #hud .block { text-align: center; }
    #timer-val { color: #f5c842; }

    /* ─── BUS SCENE ─── */
    #scene {
      position: fixed;
      top: 52px; left: 0; right: 0; bottom: 0;
      overflow: hidden;
    }

    /* Bus body */
    #bus-body {
      position: absolute;
      top: 30px; left: 0; right: 0;
      height: calc(100% - 160px);
      background: #dce8f0;
      border-top: 6px solid #8aaabf;
      border-bottom: 6px solid #8aaabf;
    }

    /* Windows strip */
    #windows-strip {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 28px;
      background: #b8d4e8;
      border-bottom: 3px solid #8aaabf;
      display: flex; align-items: center;
      padding: 0 20px;
      gap: 60px;
    }
    .window-sm {
      width: 50px; height: 18px;
      background: #d4ecf7;
      border: 2px solid #8aaabf;
      border-radius: 3px 3px 0 0;
    }

    /* ─── SEATS AREA ─── */
    #seats-area {
      position: absolute;
      top: 28px; left: 0; right: 0; bottom: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 52px;          /* pasillo entre grupos */
      padding: 16px 40px 8px;
    }

    .seat-col {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ─── ASIENTO BASE ─── */
    .seat {
      width: 120px; height: 120px;
      border-radius: 12px 12px 8px 8px;
      border: none;                     /* imagen propia, sin borde */
      display: flex; align-items: center; justify-content: center;
      position: relative;
      transition: transform 0.15s, box-shadow 0.15s;
      cursor: default;
      overflow: visible;
      flex-shrink: 0;
      background: transparent;          /* la imagen es la visual */
    }

    /* Imagen de la silla (fondo) */
    .seat-base-img {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: contain;
      position: absolute;
      top: 0; left: 0;
      pointer-events: none;
      border-radius: 10px;
      transition: filter 0.15s;
    }

    /* Slot donde aparece el personaje sentado */
    .seat-char-slot {
      position: absolute;
      bottom: -10%;
      left: 50%;
      transform: translateX(-50%);
      width: 85%;
      height: 130%;
      pointer-events: none;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      z-index: 3;
    }
    .seat-char-slot img {
      width: 100%;
      height: 100%;
      object-fit: contain;
    }

    /* Estados */
    .seat.highlight .seat-base-img { filter: brightness(1.25) drop-shadow(0 0 6px #4caf50); }
    .seat.error-flash .seat-base-img { filter: brightness(1.1) drop-shadow(0 0 8px #e05555); }
    .seat.filled .seat-base-img { filter: brightness(1.0) saturate(0.8); }

    /* ─── PERSPECTIVA DE FILAS ─── */
    /*
      row-back  = fila de atrás (arriba en pantalla) → más pequeña y subida
      row-front = fila de adelante (abajo en pantalla) → más grande y bajada
      El desfase en Y da la sensación de profundidad.
    */
    .seat.row-back {
      transform: translateY(-38px) scale(0.72);
      z-index: 1;
    }
    .seat.row-back.highlight {
      transform: translateY(-38px) scale(0.77);
    }
    .seat.row-back.error-flash {
      transform: translateY(-38px) scale(0.72);
    }

    .seat.row-front {
      transform: translateY(38px) scale(1.28);
      z-index: 2;
    }
    .seat.row-front.highlight {
      transform: translateY(38px) scale(1.33);
    }
    .seat.row-front.error-flash {
      transform: translateY(38px) scale(1.28);
    }

    /* ─── RED LINE ZONE ─── */
    #red-line-zone {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 160px;                    /* más alto para los personajes grandes */
      background: #1a2a3a;
    }

    #red-line {
      position: absolute;
      top: 22px; left: 0; right: 0;
      height: 10px;
      background: var(--red-line);
      box-shadow: 0 0 16px rgba(224,32,32,0.7);
    }

    /* Characters on red line */
    #char-lane {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 160px;
      pointer-events: none;
    }

    /* ─── PERSONAJES: MÁS GRANDES ─── */
    .character {
      position: absolute;
      bottom: 14px;
      width: 120px; height: 148px;      /* más grandes que antes (88×108) */
      cursor: grab;
      pointer-events: all;
      transition: transform 0.12s;
      z-index: 10;
      touch-action: none;
    }

    .character:hover { transform: scale(1.08) translateY(-5px); }

    .character.dragging {
      cursor: grabbing;
      z-index: 999;
      pointer-events: none;
      position: fixed;
      transition: none;
      transform-origin: top center;
    }

    .character img {
      width: 100%; height: 100%;
      object-fit: contain;
      pointer-events: none;
    }

    /* name tag */
    .char-label {
      position: absolute;
      bottom: -18px; left: 50%;
      transform: translateX(-50%);
      font-size: 10px; color: #fff;
      white-space: nowrap;
      background: rgba(0,0,0,0.55);
      padding: 1px 5px; border-radius: 4px;
      font-family: var(--font-body);
    }

    /* ─── WIN SCREEN ─── */
    #win-screen {
      display: none;
      position: fixed; inset: 0;
      background: rgba(10,20,35,0.92);
      z-index: 200;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    #win-screen.show { display: flex; }

    #win-screen h1 {
      font-family: var(--font-head);
      font-size: 52px; color: #f5c842;
      text-shadow: 0 4px 20px rgba(245,200,66,0.5);
    }

    #win-screen .score-big {
      font-family: var(--font-head);
      font-size: 36px; color: #fff;
    }

    #win-screen .win-btns {
      display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; justify-content: center;
    }

    .win-btn {
      padding: 14px 32px;
      border-radius: 10px;
      border: none; cursor: pointer;
      font-family: var(--font-head);
      font-size: 18px;
      transition: transform 0.12s, filter 0.12s;
    }
    .win-btn:hover { transform: scale(1.05); filter: brightness(1.1); }
    .win-btn.retry  { background: #f5c842; color: #1a2a3a; }
    .win-btn.levels { background: #4caf50; color: #fff; }
    .win-btn.menu   { background: #3a7abf; color: #fff; }

    /* ─── SCORE POP ─── */
    .score-pop {
      position: fixed;
      font-family: var(--font-head);
      font-size: 22px;
      color: #6dbd7a;
      pointer-events: none;
      z-index: 300;
      animation: popUp 0.8s forwards;
    }
    @keyframes popUp {
      0%   { opacity: 1; transform: translateY(0) scale(1); }
      100% { opacity: 0; transform: translateY(-60px) scale(1.4); }
    }

    /* ─── RESPONSIVE MÓVIL PORTRAIT ─── */
    @media (max-width: 540px) {

      /* — HUD — */
      #hud { height: 44px; padding: 0 10px; }
      #hud .label { font-size: 10px; letter-spacing: 0.5px; }
      #hud .value { font-size: 16px; }

      #scene { top: 44px; }

      /* — BUS: ~58% del viewport; personajes ~42%
         bus-body height = scene_height - zona_personajes = calc(100% - 42vh)
         Se solapan 30px por el top:30 del bus, que es el hueco visual de ruedas */
      #bus-body { height: calc(100% - 42vh); }

      /* — Ventanillas — */
      #windows-strip { gap: 20px; padding: 0 10px; }
      .window-sm { width: 30px; height: 13px; }

      /* — Asientos al TOPE del bus, no al centro — */
      #seats-area {
        align-items: flex-start;
        justify-content: center;
        gap: 0;
        padding: 18px 8px 0;
      }

      /* Asientos 68px para caber holgados en 370px de ancho */
      .seat { width: 68px; height: 68px; border-radius: 8px 8px 5px 5px; }

      /* Perspectiva ajustada al nuevo tamaño */
      .seat.row-back  { transform: translateY(-18px) scale(0.72); }
      .seat.row-back.highlight   { transform: translateY(-18px) scale(0.77); }
      .seat.row-back.error-flash { transform: translateY(-18px) scale(0.72); }

      .seat.row-front  { transform: translateY(18px) scale(1.28); }
      .seat.row-front.highlight   { transform: translateY(18px) scale(1.33); }
      .seat.row-front.error-flash { transform: translateY(18px) scale(1.28); }

      /* — Zona de personajes: 42% del viewport — */
      #red-line-zone { height: 42vh; }
      #char-lane     { height: 42vh; }
      #red-line      { top: 22px; height: 8px; }

      .character { width: 72px; height: 89px; bottom: 14px; }
      .char-label { font-size: 9px; bottom: -15px; }

      /* — Pantalla de victoria — */
      #win-screen h1         { font-size: 32px; }
      #win-screen .score-big { font-size: 22px; }
      .win-btn { padding: 10px 18px; font-size: 14px; }
    }
  </style>
</head>
<body>

<!-- HUD -->
<div id="hud">
  <div class="block"><div class="label">Puntaje</div><div class="value" id="score-val">0</div></div>
  <div class="block"><div class="label">Nivel 1</div><div class="value" style="font-size:15px;color:#aac">Sienta a todos</div></div>
  <div class="block"><div class="label">Tiempo</div><div class="value" id="timer-val">0s</div></div>
</div>

<!-- BUS SCENE -->
<div id="scene">
  <div id="bus-body">
    <div id="windows-strip">
      <div class="window-sm"></div>
      <div class="window-sm"></div>
      <div class="window-sm"></div>
      <div class="window-sm"></div>
    </div>
    <div id="seats-area"></div>
  </div>

  <!-- Red line zone -->
  <div id="red-line-zone">
    <div id="red-line"></div>
    <div id="char-lane"></div>
  </div>
</div>

<!-- Win Screen -->
<div id="win-screen">
  <h1>¡Nivel Completado!</h1>
  <div class="score-big" id="final-score">Puntaje: 0</div>
  <div class="win-btns">
    <button class="win-btn retry"  onclick="restartGame()">🔄 Reintentar</button>
    <button class="win-btn levels" onclick="window.location.href='../niveles.html'">🗂 Niveles</button>
    <button class="win-btn menu"   onclick="window.location.href='../index.html'">🏠 Menú</button>
  </div>
</div>

<script>
// ─── CONFIG ───
const NORMAL_CHARS  = ['señor','señora','godin','godina','Obrero','niño'];
const INVALID_CHARS = ['ancianita','embarazada','fracturada','fracturado','muletas'];
const CHAR_PATH     = '../img/personajes/';
const TOTAL_SEATS   = 8;        // 4 normal + 4 disabled
const SPAWN_INTERVAL = 2200;    // ms between spawns
const BASE_SCORE_PER_CHAR = 200;

// ─── SOUNDS ───
function makeAudio(src, vol = 0.6) {
  const a = new Audio('../' + src);
  a.volume = vol;
  return a;
}

const sfx = {
  correct  : makeAudio('sounds/correct.wav'),
  incorrect: makeAudio('sounds/incorrect.wav'),
  ganar    : makeAudio('sounds/ganar.wav'),
  perder   : makeAudio('sounds/perder.wav'),
  hold     : [1,2,3,4,5,6].map(n => makeAudio('sounds/e' + n + '.wav', 0.5))
};

let holdInterval = null;

function playHold() {
  stopHold();
  const clip = sfx.hold[Math.floor(Math.random() * sfx.hold.length)];
  clip.currentTime = 0;
  clip.play().catch(() => {});
}

function stopHold() {
  sfx.hold.forEach(a => { a.pause(); a.currentTime = 0; });
}

function playSfx(key) {
  const a = sfx[key];
  if (!a) return;
  a.currentTime = 0;
  a.play().catch(() => {});
}

// ─── STATE ───
let score        = 0;
let elapsed      = 0;
let timerHandle  = null;
let spawnHandle  = null;
let gameOver     = false;
let seated       = 0;

let chosenNormal  = [];
let chosenInvalid = [];
let allChars      = [];
let spawnQueue    = [];
let spawnIndex    = 0;

let dragged       = null;
let dragOffX      = 0;
let dragOffY      = 0;

// ─── PHYSICS STATE ───
const physics = {
  angle   : 0,
  vel     : 0,
  prevX   : 0,
  rafId   : null
};

const PHYS_INFLUENCE   = 0.18;
const PHYS_DAMPING     = 0.84;
const PHYS_SPRING      = 0.08;
const PHYS_MAX_ANGLE   = 32;

// ─── SEATS ───
const seatDefs = [
  { type: 'normal'   },
  { type: 'normal'   },
  { type: 'normal'   },
  { type: 'normal'   },
  { type: 'disabled' },
  { type: 'disabled' },
  { type: 'disabled' },
  { type: 'disabled' },
];
let seatEls = [];
let seatFilled = [false,false,false,false,false,false,false,false];

function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [a[i],a[j]] = [a[j],a[i]];
  }
  return a;
}

// ─── HELPERS RESPONSIVOS ───
function isMobile()      { return window.innerWidth <= 540; }
function getSeatSz()     { return isMobile() ? 68  : 120; }   // coincide con CSS .seat { width/height }
function getAisleSz()    { return isMobile() ? 16  : 52;  }   // pasillo estrecho en portrait
function getSeatGap()    { return isMobile() ? 5   : 10;  }   // gap columna grid
function getSeatRowGap() { return isMobile() ? 10  : 20;  }   // gap fila grid
function getCharW()      { return isMobile() ? 72  : 120; }   // coincide con CSS .character { width }

// ─── BUILD SEATS ───
function buildSeats() {
  const area = document.getElementById('seats-area');
  area.innerHTML = '';
  area.style.gap = '0';

  function makeGroup(indices) {
    const group = document.createElement('div');
    // Grid 2×2 — el desfase visual viene de row-back / row-front
    const sz = getSeatSz(), sg = getSeatGap(), rg = getSeatRowGap();
    group.style.cssText = `display:grid;grid-template-columns:repeat(2,${sz}px);gap:${sg}px ${sg}px;row-gap:${rg}px;`;

    indices.forEach((idx, pos) => {
      const seat = document.createElement('div');
      const rowClass = pos < 2 ? 'row-back' : 'row-front';
      seat.className = 'seat ' + seatDefs[idx].type + ' ' + rowClass;
      seat.dataset.idx = idx;

      // ── Imagen de la silla ──
      const seatImg = document.createElement('img');
      seatImg.className = 'seat-base-img';
      seatImg.src = seatDefs[idx].type === 'disabled'
        ? '../img/sillainv.png'
        : '../img/silla.png';
      seatImg.alt = seatDefs[idx].type === 'disabled' ? 'Silla especial' : 'Silla';
      seat.appendChild(seatImg);

      // ── Slot para el personaje sentado ──
      const slot = document.createElement('div');
      slot.className = 'seat-char-slot';
      seat.appendChild(slot);

      seat.addEventListener('mouseenter', () => highlightSeat(idx));
      seat.addEventListener('mouseleave', () => unhighlightSeat(idx));
      seat.addEventListener('mouseup',    () => dropOnSeat(idx));
      seat.addEventListener('touchend',   (e) => { e.preventDefault(); dropOnSeat(idx); });

      group.appendChild(seat);
      seatEls[idx] = seat;
    });
    return group;
  }

  const aisle = document.createElement('div');
  aisle.style.cssText = `width:${getAisleSz()}px;flex-shrink:0;`;

  area.appendChild(makeGroup([0,1,2,3]));
  area.appendChild(aisle);
  area.appendChild(makeGroup([4,5,6,7]));
}

function highlightSeat(idx) {
  if (dragged && !seatFilled[idx]) seatEls[idx].classList.add('highlight');
}

function unhighlightSeat(idx) {
  seatEls[idx].classList.remove('highlight');
}

// ─── CHARACTER SELECTION ───
function pickCharacters() {
  chosenNormal  = shuffle(NORMAL_CHARS).slice(0, 4);
  chosenInvalid = shuffle(INVALID_CHARS).slice(0, 4);
  allChars = [];

  chosenNormal.forEach((name, i) => {
    allChars.push({ id: 'n'+i, name, isInvalid: false, el: null, spawned: false, seated: false });
  });
  chosenInvalid.forEach((name, i) => {
    allChars.push({ id: 'v'+i, name, isInvalid: true,  el: null, spawned: false, seated: false });
  });

  spawnQueue = shuffle(allChars);
  spawnIndex = 0;
}

// ─── SPAWN CHARACTER ON RED LINE ───
function spawnNext() {
  if (spawnIndex >= spawnQueue.length) return;
  const char = spawnQueue[spawnIndex++];
  spawnChar(char);
}

function spawnChar(char) {
  const lane = document.getElementById('char-lane');

  const el = document.createElement('div');
  el.className = 'character';
  el.dataset.id = char.id;

  el.style.right = `-${getCharW()}px`;
  el.style.left  = 'auto';

  const img = document.createElement('img');
  img.src = CHAR_PATH + char.name + '.png';
  img.alt = char.name;
  el.appendChild(img);

  const lbl = document.createElement('div');
  lbl.className = 'char-label';
  lbl.textContent = char.name;
  el.appendChild(lbl);

  lane.appendChild(el);
  char.el = el;
  char.spawned = true;

  el.addEventListener('mousedown',  (e) => startDrag(e, char));
  el.addEventListener('touchstart', (e) => startDragTouch(e, char), { passive: false });

  walkIn(el, char);
}

function walkIn(el, char) {
  const laneW = document.getElementById('char-lane').offsetWidth;
  const charW = getCharW();
  const stopX = 30 + Math.random() * (laneW - charW - 30);

  let currentX = laneW + charW;
  el.style.left = currentX + 'px';
  el.style.right = 'auto';

  char._walkAnim = setInterval(() => {
    if (char.seated || char._dragging) return;
    currentX -= 2.5;
    el.style.left = currentX + 'px';
    if (currentX <= stopX) {
      clearInterval(char._walkAnim);
      char._stopped = true;
    }
  }, 16);
}

// ─── IMAGEN SOSTENIDA ───
function setHeldImage(char, held) {
  if (!char.el) return;
  const img = char.el.querySelector('img');
  if (!img) return;
  img.src = held
    ? CHAR_PATH + char.name + '_sostenido.png'
    : CHAR_PATH + char.name + '.png';
}

// ─── FÍSICA DE PÉNDULO ───
function startPhysics(char, startX) {
  physics.angle  = 0;
  physics.vel    = 0;
  physics.prevX  = startX;

  function tick() {
    if (!char._dragging) return;
    physics.vel += -physics.angle * PHYS_SPRING;
    physics.vel *= PHYS_DAMPING;
    physics.angle += physics.vel;
    physics.angle = Math.max(-PHYS_MAX_ANGLE, Math.min(PHYS_MAX_ANGLE, physics.angle));

    if (char.el) {
      char.el.style.transform = `scale(1.15) rotate(${physics.angle}deg)`;
    }

    physics.rafId = requestAnimationFrame(tick);
  }

  physics.rafId = requestAnimationFrame(tick);
}

function stopPhysics() {
  if (physics.rafId) {
    cancelAnimationFrame(physics.rafId);
    physics.rafId = null;
  }
  physics.angle = 0;
  physics.vel   = 0;
}

function feedMouseVelocity(clientX) {
  if (!dragged) return;
  const dx = clientX - physics.prevX;
  physics.prevX = clientX;
  physics.vel += dx * PHYS_INFLUENCE;
}

// ─── DRAG ───
function startDrag(e, char) {
  if (char.seated) return;
  e.preventDefault();
  clearInterval(char._walkAnim);
  char._dragging = true;
  dragged = char;

  const rect = char.el.getBoundingClientRect();
  dragOffX = e.clientX - rect.left;
  dragOffY = e.clientY - rect.top;

  char.el.classList.add('dragging');
  char.el.style.left = rect.left + 'px';
  char.el.style.top  = rect.top  + 'px';
  document.body.appendChild(char.el);

  setHeldImage(char, true);
  playHold();
  startPhysics(char, e.clientX);
}

function startDragTouch(e, char) {
  if (char.seated) return;
  e.preventDefault();
  const t = e.touches[0];
  clearInterval(char._walkAnim);
  char._dragging = true;
  dragged = char;

  const rect = char.el.getBoundingClientRect();
  dragOffX = t.clientX - rect.left;
  dragOffY = t.clientY - rect.top;

  char.el.classList.add('dragging');
  char.el.style.left = rect.left + 'px';
  char.el.style.top  = rect.top  + 'px';
  document.body.appendChild(char.el);

  setHeldImage(char, true);
  playHold();
  startPhysics(char, t.clientX);
}

document.addEventListener('mousemove', (e) => {
  if (!dragged) return;
  dragged.el.style.left = (e.clientX - dragOffX) + 'px';
  dragged.el.style.top  = (e.clientY - dragOffY) + 'px';
  feedMouseVelocity(e.clientX);
});

document.addEventListener('touchmove', (e) => {
  if (!dragged) return;
  e.preventDefault();
  const t = e.touches[0];
  dragged.el.style.left = (t.clientX - dragOffX) + 'px';
  dragged.el.style.top  = (t.clientY - dragOffY) + 'px';
  feedMouseVelocity(t.clientX);
}, { passive: false });

document.addEventListener('mouseup',  endDrag);
document.addEventListener('touchend', endDrag);

function endDrag(e) {
  if (!dragged) return;
  const char = dragged;
  dragged = null;
  char._dragging = false;

  stopPhysics();
  stopHold();
  if (char.el) char.el.style.transform = '';

  setHeldImage(char, false);

  const pt = e.changedTouches ? e.changedTouches[0] : e;
  const target = document.elementFromPoint(pt.clientX, pt.clientY);
  const seatEl = target && (target.closest ? target.closest('.seat') : null);

  if (seatEl) {
    const idx = parseInt(seatEl.dataset.idx);
    dropOnSeat(idx, char);
  } else {
    returnToLane(char);
  }
}

function dropOnSeat(idx, charOverride) {
  const char = charOverride || dragged;
  if (!char) return;

  if (seatFilled[idx]) {
    flash(seatEls[idx], 'error-flash');
    playSfx('incorrect');
    returnToLane(char);
    return;
  }

  const seatType = seatDefs[idx].type;
  const valid = (seatType === 'disabled' && char.isInvalid) ||
                (seatType === 'normal'   && !char.isInvalid);

  if (!valid) {
    flash(seatEls[idx], 'error-flash');
    playSfx('incorrect');
    returnToLane(char);
    score = Math.max(0, score - 30);
    updateHUD();
    return;
  }

  // ✅ Correcto — coloca personaje en el slot, conserva imagen de la silla
  playSfx('correct');
  seatFilled[idx] = true;
  char.seated = true;
  seatEls[idx].classList.remove('highlight');
  seatEls[idx].classList.add('filled');

  // Limpiar slot e insertar imagen del personaje
  const slot = seatEls[idx].querySelector('.seat-char-slot');
  slot.innerHTML = '';
  const charImg = document.createElement('img');
  charImg.src = CHAR_PATH + char.name + '.png';
  charImg.alt = char.name;
  slot.appendChild(charImg);

  if (char.el) {
    if (char.el.parentNode) char.el.parentNode.removeChild(char.el);
    char.el = null;
  }

  const timeBonus = Math.max(0, 100 - elapsed);
  const pts = BASE_SCORE_PER_CHAR + timeBonus;
  score += pts;
  showScorePop('+' + pts, seatEls[idx]);
  updateHUD();

  seated++;
  if (seated >= TOTAL_SEATS) endGame();
}

function returnToLane(char) {
  if (!char.el) return;
  char.el.classList.remove('dragging');
  char.el.style.transform = '';
  const lane = document.getElementById('char-lane');
  lane.appendChild(char.el);

  const laneRect = lane.getBoundingClientRect();
  const elRect   = char.el.getBoundingClientRect();
  char.el.style.left = (elRect.left - laneRect.left) + 'px';
  char.el.style.top  = 'auto';
  char._stopped = true;
}

function flash(el, cls) {
  el.classList.add(cls);
  setTimeout(() => el.classList.remove(cls), 600);
}

// ─── SCORE POP ───
function showScorePop(text, anchor) {
  const r = anchor.getBoundingClientRect();
  const pop = document.createElement('div');
  pop.className = 'score-pop';
  pop.textContent = text;
  pop.style.left = (r.left + r.width/2 - 20) + 'px';
  pop.style.top  = (r.top - 10) + 'px';
  document.body.appendChild(pop);
  setTimeout(() => pop.remove(), 800);
}

// ─── HUD ───
function updateHUD() {
  document.getElementById('score-val').textContent = score;
  document.getElementById('timer-val').textContent = elapsed + 's';
}

// ─── TIMER ───
function startTimer() {
  timerHandle = setInterval(() => {
    elapsed++;
    updateHUD();
  }, 1000);
}

// ─── END GAME ───
function endGame() {
  gameOver = true;
  clearInterval(timerHandle);
  clearInterval(spawnHandle);

  const timeBonus = Math.max(0, (60 - elapsed) * 5);
  score += timeBonus;

  playSfx('ganar');

  document.getElementById('final-score').textContent = '¡Puntaje: ' + score + '!';
  document.getElementById('win-screen').classList.add('show');
}

// ─── RESTART ───
function restartGame() {
  document.getElementById('win-screen').classList.remove('show');
  document.getElementById('char-lane').innerHTML = '';
  document.querySelectorAll('.character').forEach(el => el.remove());

  score = 0; elapsed = 0; seated = 0; gameOver = false;
  seatFilled = [false,false,false,false,false,false,false,false];
  dragged = null;
  stopPhysics();
  clearInterval(timerHandle);
  clearInterval(spawnHandle);

  buildSeats();
  updateHUD();
  initGame();
}

// ─── INIT ───
function initGame() {
  pickCharacters();
  startTimer();
  spawnNext();
  spawnHandle = setInterval(() => {
    if (spawnIndex < spawnQueue.length) spawnNext();
    else clearInterval(spawnHandle);
  }, SPAWN_INTERVAL);
}

buildSeats();
updateHUD();
initGame();
</script>
