<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Menú Principal</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Fondo ── */
    .bg {
      position: absolute;
      inset: 0;
      background-image: url('img/fondos/fondo.png');
      background-size: cover;
      background-position: center;
      z-index: 0;
    }

    /* Overlay oscuro opcional para legibilidad */
    .bg::after {
      content: '';
      position: absolute;
      inset: 0;
      background: rgba(0,0,0,0.35);
    }

    /* ── Contenedor central ── */
    .center {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 48px;
    }

    /* ── Logo ── */
    .logo-wrap img {
      width: 300%;
      height: 300%;
      object-fit: contain;
    }

    .logo-wrap {
      width: 320px;
      height: 160px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      animation: floatLogo 4s ease-in-out infinite;
    }

    .logo-wrap span {
      color: rgba(255,255,255,0.4);
      font-size: 14px;
      letter-spacing: 1px;
    }

    @keyframes floatLogo {
      0%   { transform: translateY(0px) scale(1); }
      50%  { transform: translateY(-8px) scale(1.03); }
      100% { transform: translateY(0px) scale(1); }
    }

    /* ── Botón "Jugar" ── */
    .btn-img {
      width: 280px;
      cursor: pointer;
      transition: transform 0.15s;
    }

    .btn-img:hover  { transform: scale(1.05); }
    .btn-img:active { transform: scale(0.95); }

    /* ── Zona de control de audio (esquina superior derecha) ── */
    .audio-control {
      position: absolute;
      top: 16px;
      right: 16px;
      z-index: 2;
      display: flex;
      align-items: center;
      gap: 10px;
      /* El grupo crece hacia la izquierda */
      flex-direction: row-reverse;
    }

    /* Botón de silencio / encendido */
    .music-btn {
      width: 90px;
      cursor: pointer;
      transition: transform 0.2s;
      flex-shrink: 0;
    }

    .music-btn:hover { transform: scale(1.1); }

    /* ── Barra de volumen ── */
    .volume-wrap {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(0, 0, 0, 0.55);
      backdrop-filter: blur(8px);
      border-radius: 50px;
      padding: 6px 14px;
      /* Oculta por defecto */
      opacity: 0;
      pointer-events: none;
      transform: translateX(12px);
      transition: opacity 0.25s ease, transform 0.25s ease;
    }

    /* Se muestra al pasar el mouse por el grupo */
    .audio-control:hover .volume-wrap {
      opacity: 1;
      pointer-events: all;
      transform: translateX(0);
    }

    /* Icono de altavoz pequeño */
    .vol-icon {
      font-size: 16px;
      user-select: none;
      color: #fff;
    }

    /* Slider personalizado */
    input[type="range"].vol-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100px;
      height: 4px;
      border-radius: 4px;
      background: rgba(255,255,255,0.25);
      outline: none;
      cursor: pointer;
      accent-color: #fff;
    }

    input[type="range"].vol-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 0 4px rgba(0,0,0,0.5);
      cursor: pointer;
      transition: transform 0.15s;
    }

    input[type="range"].vol-slider::-webkit-slider-thumb:hover {
      transform: scale(1.3);
    }

    input[type="range"].vol-slider::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border: none;
      border-radius: 50%;
      background: #ffffff;
      cursor: pointer;
    }

    /* Etiqueta de porcentaje */
    .vol-label {
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      min-width: 32px;
      text-align: right;
      font-family: 'Segoe UI', sans-serif;
    }
  </style>
</head>
<body onclick="sound.play()" style="cursor: pointer;">
  <div class="bg"></div>

  <div class="center">
    <br>
    <div class="logo-wrap">
       <img src="img/logo.gif" alt="Logotipo">
    </div>
    <br>
    <img src="img/ui/boton.png" alt="Jugar" class="btn-img"
      onclick="window.location.href='niveles.html'">
  </div>

  <!-- ── Control de audio ── -->
  <div class="audio-control">
    <!-- Botón ON/OFF -->
    <img src="img/ui/sound-on.png"
         id="musicBtn"
         class="music-btn"
         onclick="toggleMusic(); event.stopPropagation();">

    <!-- Barra de volumen (aparece al hacer hover en el grupo) -->
    <div class="volume-wrap" onclick="event.stopPropagation()">
      <span class="vol-icon">🔊</span>
      <input type="range" class="vol-slider"
             id="volSlider"
             min="0" max="100" value="20"
             oninput="setVolume(this.value)">
      <span class="vol-label" id="volLabel">20%</span>
    </div>
  </div>

  <audio id="hoverSound" src="sounds/pop.wav"></audio>
  <audio id="bgMusic"    src="sounds/music.wav" loop></audio>

  <script>
    const sound  = document.getElementById("hoverSound");
    const music  = document.getElementById("bgMusic");
    const btn    = document.getElementById("musicBtn");
    const slider = document.getElementById("volSlider");
    const label  = document.getElementById("volLabel");

    let activated    = false;
    let musicStarted = false;

    /* ── Primer click: desbloquea audio en navegadores ── */
    document.addEventListener("click", () => {
      if (!activated && sound) {
        sound.play().then(() => {
          sound.pause();
          sound.currentTime = 0;
          sound.volume = 0.1;
          activated = true;
        }).catch(() => {});
      }
      if (!musicStarted && music) {
        music.volume = slider.value / 100;
        music.play();
        musicStarted = true;
      }
    });

    /* ── Control de volumen ── */
    function setVolume(val) {
      const v = val / 100;
      if (music)  music.volume  = v;
      if (sound)  sound.volume  = Math.min(v, 0.3); // el pop no sobrepasa 30 %
      label.textContent = val + "%";

      // Actualiza el degradado del slider para mostrar el relleno
      slider.style.background =
        `linear-gradient(to right, rgba(255,255,255,0.9) ${val}%, rgba(255,255,255,0.2) ${val}%)`;

      // Cambia el ícono según nivel
      const icon = document.querySelector('.vol-icon');
      if (val == 0)       icon.textContent = '🔇';
      else if (val < 40)  icon.textContent = '🔉';
      else                icon.textContent = '🔊';
    }

    /* Aplica el degradado inicial */
    setVolume(slider.value);

    /* ── Toggle música ON/OFF ── */
    function toggleMusic() {
      if (!music || !btn) return;
      if (music.paused) {
        music.play();
        btn.src = "img/ui/sound-on.png";
      } else {
        music.pause();
        btn.src = "img/ui/sound-off.png";
      }
    }
  </script>

</body>
</html>
